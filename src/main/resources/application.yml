spring:
  application:
    name: kfood-backend

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false


server:
  port: 8080

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
      show-components: never
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    defaults:
      enabled: true
    ping:
      enabled: true
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  info:
    env:
      enabled: true
