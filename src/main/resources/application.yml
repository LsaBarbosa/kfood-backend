spring:
  application:
    name: kfood-backend

  security:
    user:
      name: ${SPRING_SECURITY_USER_NAME:kfood}
      password: ${SPRING_SECURITY_USER_PASSWORD:kfood}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  data:
    redis:
      repositories:
        enabled: false

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false


server:
  port: 8080

app:
  security:
    jwt-secret: ${JWT_SECRET}
    jwt-expiration-seconds: ${JWT_EXPIRATION_SECONDS}

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
      show-components: never
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    defaults:
      enabled: true
    ping:
      enabled: true
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  info:
    env:
      enabled: true
