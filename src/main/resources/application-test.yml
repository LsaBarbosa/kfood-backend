spring:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  sql:
    init:
      mode: never

  data:
    redis:
      host: localhost
      port: 6379

  rabbitmq:
    host: localhost
    port: 5672
    username: kfood
    password: kfood

app:
  security:
    jwt-secret: test-secret-change-me-change-me-1234
    jwt-expiration-seconds: 1800

management:
  health:
    rabbit:
      enabled: false
    redis:
      enabled: false
