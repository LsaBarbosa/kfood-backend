spring:
  datasource:
    url: jdbc:h2:mem:kfood_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: false

  sql:
    init:
      mode: never

  data:
    redis:
      host: localhost
      port: 6379
      repositories:
        enabled: false

  rabbitmq:
    host: localhost
    port: 5672
    username: kfood
    password: kfood

app:
  eventing:
    rabbit:
      enabled: true
      startup-verify: false
      exchange: kfood.events
      order-created:
        queue: kfood.order.created.q
        routing-key: order.created
      order-status-changed:
        queue: kfood.order.status.changed.q
        routing-key: order.status.changed
      payment-confirmed:
        queue: kfood.payment.confirmed.q
        routing-key: payment.confirmed
  security:
    jwt-secret: test-secret-change-me-change-me-1234
    jwt-expiration-seconds: 1800

management:
  health:
    rabbit:
      enabled: false
    redis:
      enabled: false
